<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefly</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Briefly.</h1>
        <p class="subtitle">Curated audio for news that interests you</p>

        <div id="loading" class="loading-overlay" style="display: none;">
            <div class="loading-box">
                <h2>Generating your podcast...</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="loading-status" id="loading-status">Fetching articles...</p>
            </div>
        </div>

        <form method="POST" action="/" id="news-form">
            <div class="controls">
                <div class="select-combo">
                    <label class="select-label">News Category</label>
                    <div class="combo-pill">
                        <select name="category">
                        {% for cat in ['business', 'technology', 'science', 'health', 'sports', 'entertainment', 'politics', 'world'] %}
                            <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat|capitalize }}</option>
                        {% endfor %}
                        </select>
                        <button type="submit" class="combo-btn" aria-label="Generate">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <div class="steps">
            <div class="step"><span class="step-num">1</span> Choose category</div>
            <div class="step"><span class="step-num">2</span> Click the arrow</div>
            <div class="step"><span class="step-num">3</span> Hear the world around you</div>
        </div>

        {% if audio_file %}
            <div class="summary-card">
                <h3>Your News Podcast</h3>
                <audio controls>
                    <source src="{{ url_for('static', filename='audio/' + audio_file) }}" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            </div>
        {% elif request.method == 'POST' %}
            <p class="no-results">No summaries found. Try another category.</p>
        {% endif %}
    </div>

    <script>
        document.getElementById('news-form').addEventListener('submit', function () {
            const overlay = document.getElementById('loading');
            const fill = document.getElementById('progress-fill');
            const status = document.getElementById('loading-status');
            overlay.style.display = 'flex';

            const stages = [
                { pct: 15, text: 'Fetching articles...', delay: 3000 },
                { pct: 35, text: 'Extracting content...', delay: 6000 },
                { pct: 55, text: 'Summarizing articles...', delay: 12000 },
                { pct: 75, text: 'Generating audio...', delay: 20000 },
                { pct: 90, text: 'Almost there...', delay: 30000 },
            ];

            stages.forEach(function (stage) {
                setTimeout(function () {
                    fill.style.width = stage.pct + '%';
                    status.textContent = stage.text;
                }, stage.delay);
            });
        });
    </script>
</body>
</html>
